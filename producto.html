  <style>
    /* ===== PRODUCTO PAGE STYLES ===== */
    :root {
      --blue: #0066FF;
      --blue-glow: rgba(0,102,255,0.35);
      --dark: #07070f;
      --card-bg: #10101c;
      --border: #1a1a2e;
      --text: #e8e8f0;
      --muted: #7878a0;
      --green: #00e676;
      --yellow: #ffd700;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== BREADCRUMB ===== */
    .breadcrumb {
      padding: 16px 24px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: rgba(16,16,28,0.8);
    }

    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .breadcrumb a:hover { color: var(--blue); }
    .breadcrumb span { margin: 0 8px; }

    /* ===== PRODUCT LAYOUT ===== */
    .product-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .product-layout { grid-template-columns: 1fr; gap: 28px; }
    }

    /* ===== GALLERY ===== */
    .gallery-wrap { position: sticky; top: 90px; }

    .gallery-main {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #0d1140;
      aspect-ratio: 1;
      cursor: zoom-in;
      border: 1px solid var(--border);
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.4s ease;
      padding: 20px;
    }

    .gallery-main:hover img { transform: scale(1.06); }

    .gallery-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      background: linear-gradient(135deg, #FF3D71, #FF6B35);
      color: white;
      font-size: 11px;
      font-weight: 800;
      padding: 5px 12px;
      border-radius: 50px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .gallery-badge.nuevo { background: linear-gradient(135deg, #7B2FBE, #0066FF); }

    .gallery-zoom-hint {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }

    .gallery-thumbs {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .gallery-thumbs::-webkit-scrollbar { display: none; }

    .gallery-thumb {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 12px;
      overflow: hidden;
      background: #0d1140;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }

    .gallery-thumb.active { border-color: var(--blue); }
    .gallery-thumb:hover { transform: scale(1.05); }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 6px;
    }

    /* ===== PRODUCT INFO ===== */
    .product-info-wrap { padding-top: 8px; }

    .prod-tag {
      display: inline-block;
      background: rgba(0,102,255,0.15);
      color: #60a5fa;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 50px;
      border: 1px solid rgba(0,102,255,0.3);
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    .prod-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .prod-stars {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .prod-stars .stars { color: var(--yellow); font-size: 18px; letter-spacing: 2px; }
    .prod-stars .rating { font-size: 15px; font-weight: 700; }
    .prod-stars .count { font-size: 13px; color: var(--muted); }

    /* Price */
    .prod-price-section {
      background: rgba(0,102,255,0.08);
      border: 1px solid rgba(0,102,255,0.2);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .prod-price-main {
      font-size: 40px;
      font-weight: 800;
      color: white;
      line-height: 1;
    }

    .prod-price-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
    }

    .prod-price-before {
      font-size: 18px;
      color: var(--muted);
      text-decoration: line-through;
    }

    .prod-discount-tag {
      background: linear-gradient(135deg, #FF3D71, #FF6B35);
      color: white;
      font-size: 13px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 50px;
    }

    .prod-savings {
      font-size: 13px;
      color: var(--green);
      margin-top: 8px;
      font-weight: 600;
    }

    /* Trust badges */
    .trust-badges {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .trust-badge {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .trust-badge .tb-icon { font-size: 20px; }
    .trust-badge .tb-text strong { display: block; font-size: 13px; }
    .trust-badge .tb-text span { font-size: 11px; color: var(--muted); }

    /* CTA Buttons */
    .cta-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .btn-add-cart {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #0066FF, #0044cc);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(0,102,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-add-cart:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,102,255,0.5);
    }

    .btn-add-cart:active { transform: scale(0.98); }

    .btn-whatsapp {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(37,211,102,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(37,211,102,0.4);
    }

    /* Desc */
    .prod-desc-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    .prod-desc-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }

    .prod-desc-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: #c0c0d8;
      line-height: 1.5;
    }

    .prod-desc-list li::before {
      content: '✓';
      color: var(--green);
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ===== TABS ===== */
    .tabs-section {
      margin-top: 60px;
      border-top: 1px solid var(--border);
      padding-top: 40px;
    }

    .tabs-header {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .tab-btn {
      padding: 14px 24px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }

    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-btn:hover { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Reviews */
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .review-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .review-stars { color: var(--yellow); font-size: 16px; margin-bottom: 10px; }

    .review-text {
      font-size: 14px;
      color: #b8b8d0;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .review-author { display: flex; align-items: center; gap: 10px; }

    .review-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), #7B2FBE);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .review-name { font-size: 13px; font-weight: 700; }
    .review-city { font-size: 12px; color: var(--muted); }

    /* Specs table */
    .specs-table { width: 100%; border-collapse: collapse; }
    .specs-table tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
    .specs-table td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .specs-table td:first-child { color: var(--muted); width: 40%; }
    .specs-table td:last-child { font-weight: 600; }

    /* ===== RELATED PRODUCTS ===== */
    .related-section {
      margin-top: 60px;
      border-top: 1px solid var(--border);
      padding-top: 40px;
    }

    .related-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .related-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      text-decoration: none;
      color: var(--text);
      display: block;
    }

    .related-card:hover {
      transform: translateY(-4px);
      border-color: var(--blue);
    }

    .related-img {
      aspect-ratio: 1;
      background: #0d1140;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .related-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
    }

    .related-info { padding: 14px; }
    .related-name { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .related-price { font-size: 15px; font-weight: 800; color: var(--blue); }

    /* ===== LOADING ===== */
    .page-loader {
      position: fixed;
      inset: 0;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s;
    }

    .loader-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== NOT FOUND ===== */
    .not-found {
      text-align: center;
      padding: 80px 20px;
    }

    .not-found h2 { font-size: 32px; margin-bottom: 16px; }
    .not-found p { color: var(--muted); margin-bottom: 28px; }

    /* ===== QUANTITY SELECTOR ===== */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .qty-label { font-size: 14px; color: var(--muted); font-weight: 600; }

    .qty-selector {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .qty-btn {
      width: 36px; height: 36px;
      background: var(--card-bg);
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .qty-btn:hover { background: rgba(0,102,255,0.2); }

    .qty-num {
      width: 44px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 8px 0;
    }

    /* ===== STOCK indicator ===== */
    .stock-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .stock-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse-dot 1.5s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    .stock-text { color: var(--green); font-weight: 600; }
    .stock-count { color: var(--muted); }

    /* ===== TOAST ===== */
    .prod-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, #0066FF, #0044cc);
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      z-index: 9999;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,102,255,0.4);
    }

    .prod-toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

// ===== CART =====
var cart = [];
try { cart = JSON.parse(localStorage.getItem('ajbrotech_cart') || '[]'); } catch(e) { cart = []; }

function saveCart() {
  try { localStorage.setItem('ajbrotech_cart', JSON.stringify(cart)); } catch(e) {}
}

function getCartCount() {
  return cart.reduce(function(a, b) { return a + b.qty; }, 0);
}

function updateCartBadge() {
  var badge = document.getElementById('cartBadge');
  if (badge) badge.textContent = getCartCount();
}

function addToCart(id, qty) {
  qty = qty || 1;
  var p = PRODUCTS.find(function(x) { return x.id === id; });
  if (!p) return;
  var found = false;
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === id) { cart[i].qty += qty; found = true; break; }
  }
  if (!found) cart.push({ id: p.id, name: p.nameEs, price: p.price, qty: qty });
  saveCart();
  updateCartBadge();
  showProdToast('✅ ' + p.nameEs + ' agregado al carrito!');

  // Pixel tracking
  if (typeof fbq === 'function') {
    fbq('track', 'AddToCart', { content_ids:[id], content_name:p.nameEs, value:p.price, currency:'COP' });
  }
}

function formatCOP(n) {
  return '$' + Math.round(n).toLocaleString('es-CO');
}

function showProdToast(msg) {
  var t = document.getElementById('prodToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ===== LOAD PRODUCT =====
function getProductId() {
  var params = new URLSearchParams(window.location.search);
  // Soporte para ?id=X y ?p=slug (para ads)
  var idParam = params.get('id');
  var slugParam = params.get('p');
  if (idParam) return parseInt(idParam);
  if (slugParam) {
    var found = PRODUCTS.find(function(p) { return p.slug === slugParam; });
    return found ? found.id : null;
  }
  return null;
}

function loadProduct() {
  var id = getProductId();
  if (!id) { renderNotFound(); return; }
  var p = PRODUCTS.find(function(x) { return x.id === id; });
  if (!p) { renderNotFound(); return; }

  // Cargar imágenes
  fetch(p.folder + '/index.json')
    .then(function(r) { return r.json(); })
    .then(function(files) {
      p.images = files.map(function(f) { return p.folder + '/' + f; });
    })
    .catch(function() { p.images = []; })
    .finally(function() {
      renderProduct(p);
      hideLoader();
    });
}

function renderNotFound() {
  document.getElementById('productContent').innerHTML =
    '<div class="not-found">' +
    '<div style="font-size:60px;margin-bottom:20px">😕</div>' +
    '<h2>Producto no encontrado</h2>' +
    '<p>Este producto no existe o fue removido.</p>' +
    '<a href="index.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:14px 28px">← Ver todos los productos</a>' +
    '</div>';
  hideLoader();
}

function hideLoader() {
  var loader = document.getElementById('pageLoader');
  loader.style.opacity = '0';
  setTimeout(function() { loader.style.display = 'none'; }, 400);
}

// ===== LIGHTBOX =====
function openLightboxProd(src, name) {
  var lb = document.getElementById('prodLightbox');
  if (!lb) {
    lb = document.createElement('div');
    lb.id = 'prodLightbox';
    lb.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
    lb.innerHTML = '<img id="lbBigImg" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:12px" />' +
      '<button style="position:absolute;top:20px;right:24px;background:none;border:none;color:white;font-size:32px;cursor:pointer" onclick="document.getElementById(\'prodLightbox\').remove()">✕</button>';
    lb.addEventListener('click', function(e) { if (e.target === lb) lb.remove(); });
    document.body.appendChild(lb);
  }
  document.getElementById('lbBigImg').src = src;
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  // Cargar imágenes relacionadas en background
  var pendingRel = PRODUCTS.length;
  PRODUCTS.forEach(function(p) {
    fetch(p.folder + '/index.json')
      .then(function(r) { return r.json(); })
      .then(function(files) { p.images = files.map(function(f) { return p.folder + '/' + f; }); })
      .catch(function() { p.images = []; })
      .finally(function() {
        pendingRel--;
        if (pendingRel === 0) loadProduct();
      });
  });
});
